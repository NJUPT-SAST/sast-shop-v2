name: Buf

on:
  pull_request:
    paths:
      - "proto/**"
      - "buf.yaml"
      - "buf.lock"
  push:
    branches: [main]
    paths:
      - "proto/**"
      - "buf.yaml"
      - "buf.lock"
  delete:

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve breaking check policy
        id: breaking
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [[ "$(git log -1 --format=%B)" == *"buf skip breaking"* ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          breaking_against_registry: true
          pr_comment: true
          # Skip breaking change check by adding "buf skip breaking" to the commit message
          breaking: ${{ github.event_name == 'pull_request' && steps.breaking.outputs.enabled == 'true' }}
