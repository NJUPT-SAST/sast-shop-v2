name: Bug Report
description: Report a reproducible issue
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. \n2. \n3. "
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior (attach logs if available)
    validations:
      required: true
  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      options:
        - userservice
        - catalogservice
        - paymentservice
        - spotservice
        - errandservice
        - internal/pkg
