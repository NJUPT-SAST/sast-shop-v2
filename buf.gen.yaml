version: v2
clean: true
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen/protocolbuffers/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: gen/connectrpc/go
    opt:
      - paths=source_relative
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: buf.build/gen/go/sast/sast-shop-v2/protocolbuffers/go
  disable:
    - module: buf.build/bufbuild/protovalidate
