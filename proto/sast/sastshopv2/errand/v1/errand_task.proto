syntax = "proto3";

package sast.sastshopv2.errand.v1;

import "google/protobuf/timestamp.proto";
import "sast/sastshopv2/errand/v1/errand_task_item.proto";
import "sast/sastshopv2/errand/v1/errand_task_status.proto";

message ErrandTask {
  int64 task_id = 1;
  int64 store_id = 2;
  string store_name = 3;
  ErrandTaskStatus status = 4;
  repeated ErrandTaskItem items = 5;
  google.protobuf.Timestamp created_at = 6;
}
