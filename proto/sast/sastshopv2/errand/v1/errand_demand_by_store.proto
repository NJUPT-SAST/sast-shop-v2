syntax = "proto3";

package sast.sastshopv2.errand.v1;

import "google/protobuf/timestamp.proto";

message ErrandDemandByStore {
  int64 store_id = 1;
  string store_name = 2;
  repeated string participant_avatars = 3;
  int32 total_origin_unit_price_cents = 4;
  int32 total_service_fee_cents = 5;
  google.protobuf.Timestamp updated_at = 6;
}
