syntax = "proto3";

package sast.sastshopv2.payment.v1;

import "sast/sastshopv2/payment/v1/bill.proto";

message CreateBillForOrderRequest {
  string source_type = 1;
  int64 source_id = 2;
  int64 payer_id = 3;
  int64 payee_id = 4;
  int32 amount_cents = 5;
}

message CreateBillForOrderResponse {
  Bill bill = 1;
}

message CancelBillBySourceRequest {
  string source_type = 1;
  int64 source_id = 2;
  // 指定时只取消该付款人的账单，未指定时取消同一业务来源下所有未完成账单
  optional int64 payer_id = 3;
}

message CancelBillBySourceResponse {}

service PaymentInternalService {
  // 为订单或任务创建支付账单，按 source_type + source_id + payer_id 幂等
  // 现货使用 source_type = "spot_order"、source_id = spot_order.id
  // 跑腿使用 source_type = "errand_task"、source_id = errand_task.id，并按 payer_id 聚合
  rpc CreateBillForOrder(CreateBillForOrderRequest) returns (CreateBillForOrderResponse);

  // 按业务来源取消账单，用于订单或任务取消后的账单作废
  rpc CancelBillBySource(CancelBillBySourceRequest) returns (CancelBillBySourceResponse);
}
