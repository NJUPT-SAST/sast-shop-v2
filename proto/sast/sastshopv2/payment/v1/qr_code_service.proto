syntax = "proto3";

package sast.sastshopv2.payment.v1;

import "sast/sastshopv2/payment/v1/channel.proto";
import "sast/sastshopv2/payment/v1/qr_code.proto";

message GetQrCodeRequest {
  // 可选参数，指定获取某个用户的二维码列表，如果不指定则获取用户自己的二维码
  optional int64 owner_id = 1;
}

message GetQrCodeResponse {
  repeated QrCode qr_codes = 1;
}

message UpdateQrCodeRequest {
  Channel channel = 1;
  string content = 2;
}

message UpdateQrCodeResponse {
  QrCode qr_code = 1;
}

service QrCodeService {
  // 获取二维码列表
  rpc GetQrCode(GetQrCodeRequest) returns (GetQrCodeResponse);

  // 更新二维码内容
  rpc UpdateQrCode(UpdateQrCodeRequest) returns (UpdateQrCodeResponse);
}
